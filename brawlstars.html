<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Brawl Stars Trénink</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎯 Jak se zlepšit v Brawl Stars</h1>

        <section class="box">
            <h2>📋 Denní úkoly</h2>

            <div class="task">
                <label><input type="checkbox"> Hrát 3 zápasy denně</label>
            </div>

            <div class="task">
                <label><input type="checkbox"> Zlepšit aim</label>
            </div>

            <div class="task">
                <label><input type="checkbox"> Naučit se nový brawler</label>
            </div>

            <div class="task">
                <label><input type="checkbox"> Hrát s týmem</label>
            </div>

            <div class="task">
                <label><input type="checkbox"> Sledovat pro hráče</label>
            </div>

            <p class="counter">Splněno: <span id="counter">0</span></p>
        </section>

        <section class="box">
            <h2>💡 Tipy</h2>
            <ul>
                <li>Trénuj pravidelně</li>
                <li>Pozoruj pohyb nepřátel</li>
                <li>Využívej krytí</li>
                <li>Spolupracuj s týmem</li>
            </ul>
        </section>
    </div>

    <script>
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        const counter = document.getElementById('counter');

        checkboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                let count = 0;
                checkboxes.forEach(c => {
                    if (c.checked) count++;
                });
                counter.textContent = count;
            });
        });
    </script>

</body>
</html>
